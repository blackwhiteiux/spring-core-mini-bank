version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: mini_bank_postgres
    environment:
      POSTGRES_DB: mini_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: